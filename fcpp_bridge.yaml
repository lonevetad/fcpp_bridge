# fcpp-bridge project configuration
# ───────────────────────────────────────────────────────────────────────────
# Both YAML (fcpp_bridge.yaml / .yml) and JSON (fcpp_bridge.json) are
# supported.  YAML takes precedence when both files are present.
#
# This file is searched from the current working directory upward, so you can
# place it at the repository root and it will be found regardless of where you
# run your script.
#
# All values shown below are the built-in defaults.
# Remove or comment-out any line you do not need to customise.
# ───────────────────────────────────────────────────────────────────────────

# C++ standard — single source of truth for BOTH steps:
#   • transpiler: controls generated code style (structured bindings,
#                 std::views::keys/values, etc.)
#   • compiler:   passed as -std=<value> to g++
#
# Accepted: cpp14 | cpp17 | cpp20 | cpp26   (case-insensitive;
#           also accepts "17", "c++17", etc.)
cpp_standard: cpp17

# Default initial number of nodes in a simulation.
# AbstractExample subclasses can call load_config().network_size to use this
# value instead of hardcoding a constant.
network_size: 20

# Default simulation area as [width, height] in the same units used by FCPP's
# geometry primitives (e.g. rectangle_walk).  Individual examples that need a
# non-square or differently-scaled area can ignore this and use their own
# module-level AREA constant.
area_size: [500.0, 500.0]

compiler:
  # Directory where compiled binaries are cached.
  cache_dir: build

  # Directory where generated C++ source files are written.
  cpp_dir: cpp_transpiled

  # Path to the g++ executable.  Use an absolute path if g++ is not on PATH,
  # e.g. /usr/bin/g++-13
  gcc_path: g++

  # Optimisation level: 0 | 1 | 2 | 3 | s | g
  opt_level: "2"

  # Additional include directories (prepended with -I).
  # Example:
  #   extra_includes:
  #     - /opt/mylib/include
  #     - /usr/local/include/fcpp
  extra_includes: []
